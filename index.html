<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Key System</title>
</head>

<body>

  <h2>Enter Key</h2>

  <input id="keyInput" placeholder="Enter your key" />
  <button id="checkKeyButton">Check Key</button>

  <p id="keyStatus"></p>

  <hr>

  <div id="userDashboard" style="display:none;">
    <h3>Dashboard</h3>
    <p>Key ID: <span id="dashboardKeyId"></span></p>
    <p>Status: <span id="dashboardStatus"></span></p>
  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
